<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScreenLink</title>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #1a1d24;
    --border: #2a2d36;
    --accent: #00e5a0;
    --accent2: #0090ff;
    --text: #e8eaf0;
    --muted: #6b7280;
    --danger: #ff4757;
    --warn: #ffb800;
    --radius: 12px;
    --font-mono: 'JetBrains Mono', monospace;
    --font-ui: 'Space Grotesk', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 1rem;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  header {
    width: 100%;
    max-width: 760px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 0 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
  }

  .logo-icon {
    width: 28px; height: 28px;
    border: 2px solid var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
    box-shadow: none;
  }
  .status-dot.on { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-dot.err { background: var(--danger); }

  main {
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* Tab switch */
  .tabs {
    display: flex;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 4px;
    gap: 4px;
  }

  .tab-btn {
    flex: 1;
    padding: 0.6rem 1rem;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.18s;
  }
  .tab-btn.active {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* Panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    display: none;
    flex-direction: column;
    gap: 1.25rem;
  }
  .panel.active { display: flex; }

  .panel-label {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: -0.5rem;
  }

  /* Code display */
  .code-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .code-value {
    font-family: var(--font-mono);
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: var(--accent);
    user-select: all;
  }

  .copy-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    padding: 0.4rem 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--accent); }

  /* Input */
  .code-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    font-family: var(--font-mono);
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 0.28em;
    color: var(--text);
    width: 100%;
    text-align: center;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s;
    caret-color: var(--accent);
  }
  .code-input::placeholder { color: var(--border); letter-spacing: 0.2em; }
  .code-input:focus { border-color: var(--accent2); }

  /* Buttons */
  .btn {
    border: none;
    border-radius: 10px;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 0.85rem 1.5rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { filter: brightness(1.12); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }

  .btn-blue {
    background: var(--accent2);
    color: #fff;
  }
  .btn-blue:hover { filter: brightness(1.15); }
  .btn-blue:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }
  .btn-danger:hover { background: rgba(255,71,87,0.08); }

  /* Info row */
  .info-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
    color: var(--muted);
    padding: 0.75rem 1rem;
    background: var(--bg);
    border-radius: 8px;
    border-left: 3px solid var(--border);
  }
  .info-row.ok { color: var(--accent); border-left-color: var(--accent); }
  .info-row.err { color: var(--danger); border-left-color: var(--danger); }
  .info-row.warn { color: var(--warn); border-left-color: var(--warn); }

  /* Video area */
  .video-container {
    background: #000;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    min-height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .video-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-size: 0.85rem;
    font-family: var(--font-mono);
    letter-spacing: 0.06em;
  }

  .video-placeholder svg { opacity: 0.3; }

  video {
    width: 100%;
    height: 100%;
    max-height: 500px;
    object-fit: contain;
    display: none;
  }

  /* Live badge */
  .live-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(0,0,0,0.75);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 3px 10px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: var(--accent);
    display: none;
    align-items: center;
    gap: 6px;
  }

  /* Peer list */
  .peer-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-size: 0.82rem;
    font-family: var(--font-mono);
  }
  .peer-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 8px;
    color: var(--muted);
  }
  .peer-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

  footer {
    max-width: 760px;
    width: 100%;
    margin-top: 2rem;
    padding: 1.25rem 0 2rem;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">&#9632;</div>
    SCREENLINK
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="status-dot" id="globalDot"></div>
    <span id="globalStatus" style="font-family:var(--font-mono);font-size:0.75rem;color:var(--muted);letter-spacing:0.06em;">CONNECTING…</span>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('share')">&#9650; SHARE SCREEN</button>
    <button class="tab-btn" onclick="switchTab('view')">&#9632; VIEW SCREEN</button>
  </div>

  <!-- SHARE PANEL -->
  <div class="panel active" id="sharePanel">
    <p class="panel-label">Your session code</p>

    <div class="code-box">
      <div class="code-value" id="myCode">------</div>
      <button class="copy-btn" onclick="copyCode()">COPY</button>
    </div>

    <div class="info-row" id="shareInfo">
      Initializing peer network…
    </div>

    <button class="btn btn-primary" id="shareBtn" onclick="startShare()" disabled>
      &#9650;&nbsp; START SHARING
    </button>
    <button class="btn btn-danger" id="stopBtn" onclick="stopShare()" style="display:none;">
      &#9632;&nbsp; STOP SHARING
    </button>

    <div class="video-container" id="previewContainer" style="display:none;">
      <video id="localVideo" autoplay muted playsinline></video>
      <div class="live-badge" id="liveBadge">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;animation:pulse 1s infinite;"></span>
        LIVE
      </div>
    </div>

    <div id="peerListContainer" style="display:none;">
      <p class="panel-label" style="margin-bottom:8px;">Connected viewers</p>
      <div class="peer-list" id="peerList"></div>
    </div>
  </div>

  <!-- VIEW PANEL -->
  <div class="panel" id="viewPanel">
    <p class="panel-label">Enter session code</p>

    <input
      class="code-input"
      id="codeInput"
      type="text"
      maxlength="6"
      placeholder="XXXXXX"
      oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
    />

    <div class="info-row" id="viewInfo">Enter a 6-character code to connect</div>

    <button class="btn btn-blue" id="connectBtn" onclick="connectToHost()">
      &#9658;&nbsp; CONNECT
    </button>
    <button class="btn btn-danger" id="disconnectBtn" onclick="disconnectFromHost()" style="display:none;">
      &#9632;&nbsp; DISCONNECT
    </button>

    <div class="video-container" id="remoteContainer" style="display:none;">
      <div class="video-placeholder" id="remotePlaceholder">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="8" width="40" height="28" rx="3" stroke="currentColor" stroke-width="2"/>
          <path d="M17 44h14M24 36v8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Waiting for stream…
      </div>
      <video id="remoteVideo" autoplay playsinline></video>
      <div class="live-badge" id="remoteLiveBadge">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;animation:pulse 1s infinite;"></span>
        RECEIVING
      </div>
    </div>
  </div>
</main>

<footer>
  <span>P2P — NO SERVER — NO DATA STORED</span>
  <span id="footerPeerId"></span>
</footer>

<style>
@keyframes pulse {
  0%,100% { opacity:1; } 50% { opacity:0.3; }
}
</style>

<script>
let peer = null;
let myPeerId = null;
let localStream = null;
let activeConnections = {};
let viewerConn = null;
let activeCall = null;

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

function initPeer(id) {
  return new Promise((resolve, reject) => {
    const p = new Peer(id, {
      host: '0.peerjs.com',
      port: 443,
      path: '/',
      secure: true,
      debug: 0
    });
    p.on('open', (assignedId) => {
      myPeerId = assignedId;
      resolve(p);
    });
    p.on('error', reject);
  });
}

async function init() {
  const code = genCode();
  setStatus('CONNECTING…', '');
  try {
    peer = await initPeer('sl-' + code);
    document.getElementById('myCode').textContent = code;
    document.getElementById('footerPeerId').textContent = 'ID: sl-' + code;
    setStatus('READY', 'on');
    setInfo('shareInfo', 'Share this code — peer network ready', 'ok');
    document.getElementById('shareBtn').disabled = false;
    setupIncomingCalls();
  } catch (e) {
    setStatus('ERROR', 'err');
    setInfo('shareInfo', 'Could not connect to peer network. Check your connection.', 'err');
  }
}

function setupIncomingCalls() {
  peer.on('call', (call) => {
    if (!localStream) return;
    call.answer(localStream);
    const viewerId = call.peer;
    activeConnections[viewerId] = call;
    updatePeerList();
    call.on('close', () => { delete activeConnections[viewerId]; updatePeerList(); });
    call.on('error', () => { delete activeConnections[viewerId]; updatePeerList(); });
  });
}

async function startShare() {
  try {
    localStream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 30 },
      audio: true
    });
    const video = document.getElementById('localVideo');
    video.srcObject = localStream;
    video.style.display = 'block';
    document.getElementById('previewContainer').style.display = 'flex';
    document.getElementById('liveBadge').style.display = 'flex';
    document.getElementById('shareBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'flex';
    document.getElementById('peerListContainer').style.display = 'block';
    setInfo('shareInfo', 'Sharing screen — viewers can connect with your code', 'ok');

    localStream.getVideoTracks()[0].onended = () => stopShare();
  } catch (e) {
    if (e.name !== 'NotAllowedError') {
      setInfo('shareInfo', 'Screen capture failed: ' + e.message, 'err');
    }
  }
}

function stopShare() {
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  Object.values(activeConnections).forEach(c => { try { c.close(); } catch(_){} });
  activeConnections = {};
  const video = document.getElementById('localVideo');
  video.srcObject = null;
  video.style.display = 'none';
  document.getElementById('previewContainer').style.display = 'none';
  document.getElementById('liveBadge').style.display = 'none';
  document.getElementById('shareBtn').style.display = 'flex';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('peerListContainer').style.display = 'none';
  updatePeerList();
  setInfo('shareInfo', 'Screen sharing stopped', '');
}

function updatePeerList() {
  const list = document.getElementById('peerList');
  const ids = Object.keys(activeConnections);
  list.innerHTML = ids.length === 0
    ? '<div class="peer-item" style="color:var(--muted)">No viewers connected yet</div>'
    : ids.map((id,i) => `<div class="peer-item"><div class="peer-dot"></div>Viewer ${i+1} &mdash; <span style="color:var(--accent)">${id.replace('sl-','').slice(0,8)}…</span></div>`).join('');
}

function createDummyStream() {
  try {
    const ctx = new AudioContext();
    const dest = ctx.createMediaStreamDestination();
    return dest.stream;
  } catch(e) {
    const canvas = document.createElement('canvas');
    canvas.width = 1; canvas.height = 1;
    return canvas.captureStream(1);
  }
}

async function connectToHost() {
  const raw = document.getElementById('codeInput').value.trim();
  if (raw.length !== 6) {
    setInfo('viewInfo', 'Code must be exactly 6 characters', 'err');
    return;
  }
  const hostId = 'sl-' + raw;
  setInfo('viewInfo', 'Connecting to ' + raw + '…', 'warn');
  document.getElementById('connectBtn').disabled = true;
  document.getElementById('remoteContainer').style.display = 'flex';

  // Create a fresh viewer peer with a random ID
  if (peer && !peer.destroyed) { try { peer.destroy(); } catch(_){} }
  try {
    peer = await initPeer('v-' + genCode());
  } catch(e) {
    setInfo('viewInfo', 'Network error. Check your connection.', 'err');
    document.getElementById('connectBtn').disabled = false;
    return;
  }

  // Call host with a silent dummy stream so WebRTC can negotiate
  const dummy = createDummyStream();
  const call = peer.call(hostId, dummy);
  activeCall = call;

  if (!call) {
    setInfo('viewInfo', 'Failed to reach host. Is the code correct?', 'err');
    document.getElementById('connectBtn').disabled = false;
    return;
  }

  // This fires when the host answers with their screen stream
  call.on('stream', (stream) => {
    const video = document.getElementById('remoteVideo');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('remotePlaceholder').style.display = 'none';
    document.getElementById('remoteLiveBadge').style.display = 'flex';
    setInfo('viewInfo', 'Connected — receiving live screen', 'ok');
    document.getElementById('connectBtn').style.display = 'none';
    document.getElementById('disconnectBtn').style.display = 'flex';
  });

  call.on('close', () => onRemoteDisconnect());

  call.on('error', () => {
    setInfo('viewInfo', 'Could not reach host. Check the code or ask them to share first.', 'err');
    document.getElementById('connectBtn').disabled = false;
    document.getElementById('connectBtn').style.display = 'flex';
  });

  // Timeout fallback if no stream arrives
  setTimeout(() => {
    if (!document.getElementById('remoteVideo').srcObject) {
      setInfo('viewInfo', 'No stream received. Make sure the host clicked Start Sharing.', 'err');
      document.getElementById('connectBtn').disabled = false;
      document.getElementById('connectBtn').style.display = 'flex';
    }
  }, 10000);
}

function onRemoteDisconnect() {
  const video = document.getElementById('remoteVideo');
  video.srcObject = null;
  video.style.display = 'none';
  document.getElementById('remotePlaceholder').style.display = 'flex';
  document.getElementById('remoteLiveBadge').style.display = 'none';
  document.getElementById('disconnectBtn').style.display = 'none';
  document.getElementById('connectBtn').style.display = 'flex';
  document.getElementById('connectBtn').disabled = false;
  setInfo('viewInfo', 'Stream ended — host disconnected', 'warn');
}

function disconnectFromHost() {
  if (activeCall) { try { activeCall.close(); } catch(_){} activeCall = null; }
  onRemoteDisconnect();
}

function copyCode() {
  const code = document.getElementById('myCode').textContent;
  if (code === '------') return;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'COPIED!';
    setTimeout(() => btn.textContent = 'COPY', 1800);
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0) === (tab==='share')));
  document.getElementById('sharePanel').classList.toggle('active', tab === 'share');
  document.getElementById('viewPanel').classList.toggle('active', tab === 'view');
}

function setStatus(text, dotClass) {
  document.getElementById('globalStatus').textContent = text;
  const dot = document.getElementById('globalDot');
  dot.className = 'status-dot' + (dotClass ? ' ' + dotClass : '');
}

function setInfo(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'info-row' + (type ? ' ' + type : '');
}

init();
</script>
</body>
</html>
